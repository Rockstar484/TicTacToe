<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Tic Tac Toe</title>
        <link rel="icon" href="files/CO.png">
        <link rel="Stylesheet" href="style.css">
    </head>
    <body>
        <h1 id="playerDisplay"></h1>
        <table id="table">
            <tr>
                <td class="cell"><img src="files/Blank.png" id="1"></td>
                <td class="cell"><img src="files/Blank.png" id="2"></td>
                <td class="cell"><img src="files/Blank.png" id="3"></td>
            </tr>
            <tr>
                <td class="cell"><img src="files/Blank.png" id="4"></td>
                <td class="cell"><img src="files/Blank.png" id="5"></td>
                <td class="cell"><img src="files/Blank.png" id="6"></td>
            </tr>
            <tr>
                <td class="cell"><img src="files/Blank.png" id="7"></td>
                <td class="cell"><img src="files/Blank.png" id="8"></td>
                <td class="cell"><img src="files/Blank.png" id="9"></td>
            </tr>
        </table>
        <h1>Scoreboard</h1>
        <table id="scoreboard">
            <tr>
                <td><img src="files/C.png" class="scoreImage"></td>
                <td><input type="text" id="X" class="score" value="0" disabled></td>
            </tr>
            <tr>
                <td><img src="files/O.png" class="scoreImage"></td>
                <td><input type="text" id="O" class="score" value="0" disabled></td>
            </tr>
        </table>
        <script src=script.js></script>
    </body>
</html>
